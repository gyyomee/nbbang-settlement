<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>N빵 정산</title>
    <script>
      var pathSegmentsToKeep = 1;
      var locationObject = window.location;
      locationObject.replace(
        locationObject.protocol +
          "//" +
          locationObject.hostname +
          (locationObject.port ? ":" + locationObject.port : "") +
          locationObject.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          locationObject.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (locationObject.search ? "&" + locationObject.search.slice(1).replace(/&/g, "~and~") : "") +
          locationObject.hash,
      );
    </script>
  </head>
  <body></body>
</html>
